<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ontosphere × OpenWebUI Demo Stage</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
    .stage { display: flex; width: 100%; height: 100%; }
    .pane { flex: 1; height: 100%; display: flex; flex-direction: column; }
    .pane + .pane { border-left: 2px solid #333; }
    .pane-label { background: #222; color: #aaa; font: 12px monospace; padding: 4px 8px; flex-shrink: 0; }
    iframe { flex: 1; width: 100%; border: none; }
  </style>
</head>
<body>
  <div class="stage">
    <div class="pane">
      <div class="pane-label" id="chat-label">OpenWebUI</div>
      <iframe id="chat-frame" src="about:blank" allow="*"></iframe>
    </div>
    <div class="pane">
      <div class="pane-label">Ontosphere</div>
      <iframe id="app-frame" src="about:blank"></iframe>
    </div>
  </div>
  <script>
    const params  = new URLSearchParams(location.search);
    const owuiUrl = params.get('owui');
    const appUrl  = params.get('app') || (location.origin + '/');

    if (owuiUrl) {
      document.getElementById('chat-frame').src = owuiUrl;
      document.getElementById('chat-label').textContent = 'OpenWebUI';
    }
    document.getElementById('app-frame').src = appUrl;
  </script>
</body>
</html>
